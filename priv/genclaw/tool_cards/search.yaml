name: search
description: 'Fetch web facts and curated reference images for an image-gen request. Output: reference_paths (default 1 best ref per image query, vision-reranked), enriched_prompt, facts text.'
what: "A FAITHFUL search executor (cc_genclaw.tools._search web_search + image_search,\n  Tavily engine). It does NOT re-interpret, bundle, or guess: it runs each\n  query you give it, ONE BY ONE, and returns the results verbatim.\n  - text_queries / need_process_problem: each runs as its own web_search.\n  - image_queries: each runs as its own image_search (robust download +\n    vision rerank by default); results are PIL-verified and truncated to\n    final_count PER image query, not globally. With 2 image_queries and\n    final_count=2, search may return up to 4 reference_paths: 2 best refs for\n    each query.\n\n  YOU (the planner) own the reasoning and the hop-by-hop. search is just the\n  hands. For a fact chain (X -> Y -> Z), do NOT dump dependent questions in\n  one call: call search for the first hop, READ the facts, resolve the entity\n  yourself, then call search again for the next hop. Pass SELF-CONTAINED\n  queries (resolve pronouns: 'Who created Minecraft?', never 'who created\n  that game?'). Build image_queries from facts you ALREADY verified — usually\n  a final search call once the text facts are in — so text and image describe\n  the SAME entity.\n\nOutputs fact-class fields (facts; enriched_prompt = your user_intent,\nnot rewritten) and path-class fields (reference_paths grouped by image_query,\neach group best-first) in JSON content.\n"
when_to_use: "Use search when painter notes show non-empty knowledge_gaps[] OR\nwhen the user request mentions:\n- specific data (numbers, names, dates, scores, \"2025 NBA Finals MVP\")\n- specific IP / character / brand / product / landmark\n  (\"Iron Man\", \"DJI Mavic 3 Pro\", \"Mona Lisa\")\n- historical event / date+place\n- configurable per-knowledge-gap with the question text itself\n"
when_not_to_use: '- Generic subject with no specific entity ("draw a cat") → use t2i.

  - Pure abstract / style task ("warm geometric pattern") → use t2i.

  - Pure math / logic / geometry → use reason.

  - Trivial textbook colour recall ("KMnO4 dissolves to purple") → reason.

  - search reference already in the trajectory → don''t re-search (use i2i directly).

  '
usage: "Most common forms:\n\nA. Independent facts in one call (no cross-dependency) — each runs separately:\n   search({\"text_queries\": [\n      \"2026 FIFA World Cup official dates\",\n      \"2026 FIFA World Cup official mascot\"\n   ], \"user_intent\": <original user prompt>})\n\nB. Multi-hop fact chain — DO IT IN SEVERAL CALLS, you resolve each hop:\n   call 1: search({\"text_queries\": [\"world's best-selling video game of all time\"]})\n           -> facts say: Minecraft, by Markus Persson, born in Sweden\n   call 2: search({\"image_queries\": [\"flag of Sweden\"],\n                   \"user_intent\": <original user prompt>, \"final_count\": 1})\n           (image_query grounded in the Sweden you just VERIFIED)\n\nC. Direct image references when entities are already known/perceived:\n   search({\"image_queries\": [\"official reference photo of subject A\", \"official product photo of subject B\"],\n           \"final_count\": 2})\n   -> returns up to 2 refs for subject A AND up to 2 refs for subject B (not 2 total).\n\nArgs:\n  text_queries:  List[str] — self-contained web-search queries, run one by one.\n                              Resolve pronouns yourself before passing.\n  need_process_problem: List[str] — alias for text_queries (merged).\n  image_queries: List[str] — image subjects, run one by one. Ground in\n                              already-verified facts.\n  final_count:   int (default 1, max 8) — max reference images returned\n                                          PER image_query, best-first\n                                          (vision-reranked by default). For\n                                          multiple image_queries, this is not a\n                                          global cap.\n  user_intent:   str — original user prompt (used as image-rerank intent).\n"
failure_modes:
- 'reference_paths=[] but facts non-empty → image_rag failed (Tavily image quota or query too rare). The text facts may still be usable: pass original_user_prompt plus a concise search_facts_summary to format_prompt, then call t2i without an image anchor.'
- status=failed with empty facts and no refs → Tavily down or no queries given. Fall back to t2i with the user prompt directly.
- reference_paths=[] because you passed only text_queries → expected. If you need a visual ref, make a follow-up search call with image_queries grounded in the facts you just got.
cross_tool:
- After search returns exactly one reference_path and no fact / multi-reference binding is needed, the direct chain may be search → i2i (with reference_paths[0] as i2i.image_path). Do NOT chain search → code_text_draft; verbatim-text rendering is a different category of task.
- search.reference_paths is already reranked best-first within each image_query group (vision rerank by default); the planner SHOULD NOT call format_prompt just to re-rank candidates. For multiple image_queries or multiple visual entities, returned paths are grouped in image_queries order; format_prompt can bind their visual roles and produce i2i_image_path_hint + i2i_extra_reference_paths_hint. format_prompt must not re-rank, veto, filter, or reorder refs.
- For transformed physical-form requests, query the target form first. If the user asks for a known character / IP / logo / entity as a plush toy, keychain, figurine, sticker, costume, product mockup, packaging, cake, sculpture, or accessory, image_queries should include the physical form (for example "<entity> plush keychain", "<entity> plush toy strap") before falling back to identity/outfit references. Do not satisfy a plush/keychain/figurine request with only a flat character sheet or illustration unless no direct form reference exists.
- If search returns reference_paths=[] (e.g. Tavily quota exhausted or no hits), do NOT call i2i with an invented path. Drop to t2i with a rich descriptive prompt — this is the Fallback rule from the system ladder.
- Often preceded by reason(action="break_down") for complex multi-hop requests, or followed by reason(action="refine_queries") if the first search results are weak.
- format_prompt can consume original_user_prompt + a concise search_facts_summary to make the final image prompt richer for downstream i2i / t2i. If you pass reference_image_paths, format_prompt only binds each already-curated path to its visual role; it must not re-rank, veto, filter, or reorder them.
examples:
- "<example>\nUser: Draw the national flag of the country where the creator of the\n      world's best-selling video game was born.\nAssistant: This is a fact chain — I resolve it hop by hop, not in one\nbundled query. todo_write the plan (search x2 -> i2i), then:\n  search({\"text_queries\": [\"world's best-selling video game of all time and its creator\"]})\n    -> facts: Minecraft, created by Markus 'Notch' Persson, born in Sweden.\n  search({\"image_queries\": [\"national flag of Sweden\"],\n          \"user_intent\": \"national flag of Sweden, accurate\", \"final_count\": 1})\n    -> reference_paths=[/abs/.../sweden_flag.jpg]\nNext: i2i with reference_paths[0] as image_path.\n<reasoning>\nThe image query (Sweden flag) is built from a fact I VERIFIED in the\nprevious call, not guessed up front. Text and image therefore describe\nthe same entity. search itself never combined or interpreted the hops —\nI did.\n</reasoning>\n</example>\n"
